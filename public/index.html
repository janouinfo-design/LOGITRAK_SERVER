<body>
   <div class="">
    <button class="btn btn-icon btn-light-secondary btn-circle mr-2 d-none " id="alert_modal_lang" data-toggle="tooltip"
        data-theme="dark" title="Alert" pg-object="Lang" pg-action="infos" pg-dialog="modal-lg"
        pg-dialog-title="Erreur olang" pg-dialog-body="" pg-dialog-btn="btn-light-danger" pg-dialog-btn-label="Fermer"></i>
    </button>
    <button class="btn btn-icon btn-light-secondary btn-circle mr-2 d-none"  id="lang-dialog-btn"
            data-toggle="tooltip" data-theme="dark" title="Supprimer" 
            pg-object="Lang" pg-action="save_lang"
            pg-dialog="modal-mn" pg-dialog-title="<i class='fas fa-edit text-primary'></i> <span id='lang-dialog-title'>Modification</span>" 
            pg-dialog-body="<h3><span olang=''></span><input type='text' id='lang-input-field' class='form-control'></h3>"

    <button class="btn btn-icon btn-light-secondary btn-circle mr-2 d-none " id="alert-popup" data-toggle="tooltip"
        data-theme="dark" title="Alert" pg-object="Status" pg-actionn="checkIfExist" pg-dialog="modal-mn"

    </button>

    <button class="btn btn-icon btn-light-secondary btn-circle mr-2 d-none " id="column-modal" data-toggle="tooltip"
        data-theme="dark" title="Icone" pg-object="Status" pg-actionn="list" pg-dialog="modal-lg" pg-dialog-title=""
        pg-dialog-body="" pg-dialog-btn="btn-light-primary" pg-dialog-btn-label="Valider"><i class="fas fa-trash"></i>
    </button>
    <!-- Modal-->
    <button class="btn d-none" data-toggle="modal" href="#formModal">open</button>
    <div class="modal fade" id="formModal" tabindex="-1" role="dialog" aria-labelledby="staticBackdrop" aria-hidden="true">
        <div class="modal-dialog modal-dialog-scrollable" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="formModalLabel">Modal Title</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <i aria-hidden="true" class="ki ki-close"></i>
                    </button>
                </div>
                <div class="modal-body">
                    
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-light-primary font-weight-bold" data-dismiss="modal" olang='close'>Close</button>
                    <button id="formModalInfoSaver" type="button" class="btn btn-primary font-weight-bold" olang="save">Save</button>
                </div>
            </div>
        </div>
    </div>
   </div>

    <div class="container-fluid">
           <div class="my-5">
            <button 
                 class="btn btn-secondary"
                 pg-object="Lang" pg-action="start_editing" >
                 Editer lang</button>

             <strong olang="service.service">test</strong>

           <div class="row">
              <div class="col-md-6 col-lg-4 p-3">
                <div class=" bg-light border">
                      <h3 class="p-2 bg-dark text-white">DEPOTS</h3>

                            </table>
                        </div>

                </div>
              </div>
              <div class="col-md-6 col-lg-4 p-3">

                      <h3 class="p-2 bg-dark text-white">CLIENTS</h3>   
                      <div>
                        <div>
                            <table class="table"  id="customer-table">
                               
                            </table>
                        </div>
                      </div>
                </div>
              </div>
              <div class="col-md-6 col-lg-4 p-3">
                <div class=" bg-light border">
                      <h3 class="p-2 bg-dark text-white">ADRESSES</h3>   
                      <div>
                        <div>
                            <table class="table"  id="address-table">
                               
                            </table>
                        </div>
                      </div>
                </div>
              </div>
              <div class="col-md-6 col-lg-4 p-3">

                      <h3 class="p-2 bg-dark text-white">STATUS</h3>   
                      <div>
                        <div>
                            <table class="table" id="status-table">
                               
                            </table>
                        </div>
                      </div>
                </div>
              </div>
           </div>
    </div>
   
   <div class="d-none">
    <button ps-oaction="deposit/list" ps-objects="{}" ps-oncomplet="function($result , $error){console.log($result ,$error)}">Depots</button>
    <button 
     ps-oaction="deposit/get" 
     ps-objects="{id: 1}" 
     ps-oncomplet="function($result , $error){console.log($result ,$error)}">
     Get</button>
 
 
     
 
     <button 
     ps-oaction="authentication/checkUserToken" 
     ps-objects="{token: '/p0AkaQGbei3pUpIgaaK_U9TTiHWZqg3R:'}" 
     ps-oncomplet="function($result , $error){console.log($result ,$error)}">
     checkToken</button>
     
 
     <button pg-object="Customer" pg-action="list" pg-data="" >Customer list</button>
 
   </div>
   
   <button 
   ps-oaction="authentication/login" 
   ps-objects="{user: docUser,password: password}" 
   ps-oncomplet="function($result , $error){console.log($result ,$error)}">
   Login</button>
   
   <script src="js/jquery.min.js"></script>

   <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>
   <script src="js/psCore/oAction.plugin.js"></script>
   <script src="js/psCore/mutationScript.js"></script>
   <script src="js/psCore/translator.js"></script>

   <script src="js/mustache.min.js"></script>
   <script src="js/index.js"></script>

   <script src="js/plugins/customer.plugin.js"></script>
   <script src="js/plugins/lang.plugin.js"></script>

    
   <script>
        $(document).ready(function(){
              $.fn.setActionFeature()
              getDeposits()
        })

        function getDeposits(){
            $().PSAction('oAction' , 'deposit/list' , {} , drawDeposits)
        }

        const drawDeposits = (res , err)=>{

            console.log("res:", res)
              if(err) return

              let temp = `
                       <thead>
                            <th>Action</th>
                            <th>Nom</th>
                            <th>Code</th>
                            <th olang="status">Status</th>
                        </thead>
                        <tbody class="">
                           {{#list}}
                              <tr>
                                 <td>
                                    <button 
                                        ps-dialog="modal-mn" ps-dialog-title="Suppression" 
                                        ps-dialog-body="Voulez-vous vraiment supprimer ?" 
                                        ps-dialog-btn="btn-primary" ps-dialog-btn-label="Supprimer"
                                        ps-oaction="deposit/remove" 
                                        ps-objects="{id:{{id}}}" 
                                        ps-oncomplet="function($result , $error){getDeposits($result ,$error)}" 
                                    class="btn btn-danger">&times</button>
                                 </td>
                                 <td>
                                    {{label}}
                                  </td>
                                  <td>
                                    {{code}}
                                  </td>
                                  <td>
                                    {{status}}
                                  </td>
                              </tr>
                           {{/list}}
                        </tbody>
              `

              temp = parseTemplate(temp , {list: res})

              $('#deposit-table').html(temp)
        }
   </script>
</body>
</html>
